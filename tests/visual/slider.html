<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>滑块 - layui</title>

    <link rel="stylesheet" href="./assets/dist/css/layui.css" />
    <style>
      body {
        padding: 100px 0;
      }
    </style>
  </head>
  <body>
    <div class="lay-container">
      <div id="slideTest1"></div>
      <br />
      <div
        id="slideTest2"
        style="margin: 45px 30px; display: inline-block"
      ></div>
    </div>

    <script src="./assets/dist/layui.js"></script>
    <script>
      layui.use(() => {
        const { slider } = layui;

        const sliderInst = slider.render({
          elem: '#slideTest1',
          tips: true,
          tipsAlways: true,
          input: true,
          change(value) {
            console.log('change', value);
          },
          done(value) {
            console.log('done', value);
          },
          setTips: (value) => `${value}%`,
        });

        console.dir(slider);
        console.log(sliderInst);
        // sliderInst.setValue(30);

        slider.render({
          elem: '#slideTest2',
          type: 'vertical',
        });
      });
    </script>
  </body>
</html>
