<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>常用元素 - layui</title>
    <link rel="stylesheet" href="./assets/dist/css/layui.css" />
  </head>
  <body>
    <div class="lay-padding-5">
      <div
        class="lay-progress"
        lay-showPercent="true"
        lay-filter="demo-progress-1"
      >
        <div class="lay-progress-bar" lay-percent="1/3"></div>
      </div>

      <br />

      <div class="lay-progress">
        <div class="lay-progress-bar lay-bg-red" lay-percent="20%"></div>
      </div>

      <br />

      <div class="lay-progress">
        <div class="lay-progress-bar lay-bg-orange" lay-percent="30%"></div>
      </div>

      <br />

      <div class="lay-progress">
        <div class="lay-progress-bar lay-bg-green" lay-percent="40%"></div>
      </div>

      <br />

      <div class="lay-progress">
        <div class="lay-progress-bar lay-bg-blue" lay-percent="50%"></div>
      </div>

      <br />

      <div class="lay-progress">
        <div class="lay-progress-bar lay-bg-cyan" lay-percent="60%"></div>
      </div>

      <br />

      <div
        class="lay-progress lay-progress-big"
        lay-showPercent="true"
        lay-filter="demo-filter-progress"
      >
        <div class="lay-progress-bar" lay-percent="15%"></div>
      </div>

      <br />

      <div class="lay-btn-container">
        <button class="lay-btn" lay-on="setPercent">设置 50%</button>
        <button class="lay-btn" lay-on="loading">模拟 loading</button>
      </div>
    </div>

    <script src="./assets/dist/layui.js"></script>
    <script>
      layui.use(() => {
        const { progress, utils } = layui;

        // 普通事件
        utils.on({
          // 设置进度值
          setPercent() {
            progress.setValue('demo-filter-progress', '50%'); // 设置 50% 的进度
          },
          // 模拟 loading
          loading(othis) {
            const DISABLED = 'layui-btn-disabled';
            if (othis.hasClass(DISABLED)) return;

            let n = 0;
            let timer = setInterval(
              function () {
                n = (n + Math.random() * 10) | 0;
                if (n > 100) {
                  n = 100;
                  clearInterval(timer);
                  othis.removeClass(DISABLED);
                }
                progress.setValue('demo-filter-progress', n + '%');
              },
              300 + Math.random() * 1000,
            );

            othis.addClass(DISABLED);
          },
        });
      });
    </script>
  </body>
</html>
