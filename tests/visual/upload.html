<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>上传组件 - layui</title>
    <link rel="stylesheet" href="./assets/dist/css/layui.css" />
  </head>
  <body class="lay-padding-5">
    <h2>常规示例</h2>
    <hr />
    <button type="button" class="lay-btn" id="test1">选择文件</button>

    <br />

    <h2>开启多选</h2>
    <hr />
    <button type="button" class="lay-btn" id="test2">多选文件上传</button>
    <br />
    <div class="lay-btn-container">
      <button
        type="button"
        class="lay-btn lay-btn-primary lay-btn-disabled"
        id="test2-abort"
        disabled
        lay-on="abort"
      >
        中止上传
      </button>
      <button
        type="button"
        class="lay-btn lay-btn-primary"
        id="test2-clear"
        lay-on="clear"
      >
        清空上传列表
      </button>
    </div>

    <br />

    <h2>图片列表风格</h2>
    <hr />
    <button type="button" class="lay-btn" id="testPictureList">选择图片</button>

    <br />

    <h2>图片卡片列表风格</h2>
    <hr />
    <button type="button" class="lay-btn" id="testPictureCardList">
      选择图片
    </button>

    <br />

    <h2>手动上传</h2>
    <hr />
    <div class="lay-btn-container">
      <button type="button" class="lay-btn lay-btn-normal" id="test6">
        选择文件
      </button>
      <button type="button" class="lay-btn" id="test7">开始上传</button>
    </div>

    <br />

    <h2>拖拽上传</h2>
    <br />
    <div class="lay-upload-drag" id="test8">
      <i class="lay-icon">&#xe67c;</i>
      <p>点击上传，或将文件拖拽到此处</p>
    </div>

    <br />

    <h2>绑定原始文件域</h2>
    <hr />
    <input type="file" name="file" id="test9" />

    <script src="./assets/dist/layui.js"></script>
    <script>
      layui.use(() => {
        const { upload, layer, utils, progress, $ } = layui;

        // 模拟接口
        // 若需模拟上传过程，而不真实上传文件，可使用 httpbin 开源 HTTP 接口
        const url = 'https://httpbin.org/post';

        // 常规示例
        const uploadInst = upload.render({
          elem: '#test1',
          url: url,
          data: { a: 1, b: () => 2 }, // 追加接口参数
          // multiple: true,
          // maxSize: 1000,
          maxCount: 1,
          onSelect({ files }) {
            console.log(`${this.id} → onSelect  → `, files);
          },
          beforeUpload({ files }) {
            const time = 3000;
            layer.msg('模拟上传中...', { time });

            // return false; // 直接返回 false 阻止上传

            // 返回 Promise，在异步中决定「继续上传」或「阻止上传」
            return new Promise((resolve, reject) => {
              setTimeout(() => {
                if (true) {
                  layer.closeLast();
                  resolve(true); // 继续上传
                  // 或通过 Promise.resolve(false) 来阻止上传
                  // resolve(false);
                } else {
                  layer.msg('上传已被取消', { time });
                  // 通过 Promise.reject() 来阻止上传，并传递自定义错误信息
                  reject('Upload blocked.');
                }
              }, 500);
            });
          },
          onSuccess(res, params) {
            console.log(`${this.id} → onSuccess  → `, res, params);
          },
          onError(error, params) {
            console.log(`${this.id} → onError  → `, error, params);
          },
          onProgress(params) {
            console.log(`${this.id} → onProgress  → `, params);
          },
        });

        // 重载上述实例
        uploadInst.reload({
          fieldName: 'avatar',
          // maxSize: 2,
        });

        console.dir(upload);
        console.log(uploadInst);

        // 开启多选
        const uploadInst2 = upload.render({
          elem: '#test2',
          url: url,
          multiple: true, // 多选文件
          // mergeRequest: true,
          // showUploadList: false,
          // maxSize: 10,
          maxCount: 3,
          beforeUpload(params) {
            console.log(`${this.id} → beforeUpload  → `, params);

            abortBtn.enable();
          },
          onSuccess(res, params) {
            console.log(`${this.id} → onSuccess  → `, res, params);
          },
          onError(error, params) {
            console.log(`${this.id} → onError  → `, error, params);
          },
          onComplete(params) {
            console.log(`${this.id} → onComplete  → `, params);
            abortBtn.disabled();
          },
        });

        const abortBtn = {
          elem: $('#test2-abort'),
          CLASS_BTN_DISABLED: 'lay-btn-disabled',
          DISABLED: 'disabled',
          enable() {
            this.elem
              .removeClass(this.CLASS_BTN_DISABLED)
              .removeAttr(this.DISABLED);
          },
          disabled() {
            this.elem
              .addClass(this.CLASS_BTN_DISABLED)
              .attr(this.DISABLED, this.DISABLED);
          },
        };

        utils.on({
          abort() {
            // 演示中止上传
            uploadInst2.abort();
            abortBtn.disabled();
            // uploadInst2.reload();
          },
          clear() {
            // 清空上传列表
            uploadInst2.clearUploadList();
          },
        });

        // 图片列表风格
        upload.render({
          elem: '#testPictureList',
          url: url,
          listType: 'picture',
          onSuccess(res, params) {
            console.log(`${this.id} → onSuccess  → `, res, params);
          },
        });

        // 图片卡片列表风格
        upload.render({
          elem: '#testPictureCardList',
          url: url,
          listType: 'picture-card',
          onSuccess(res, params) {
            console.log(`${this.id} → onSuccess  → `, res, params);
          },
        });

        // 手动上传
        upload.render({
          elem: '#test6',
          url: url,
          autoUpload: false,
          // multiple: true,
          // mergeRequest: true,
          beforeUpload(params) {
            console.log(params);
          },
          onSuccess(res, params) {
            console.log(res, params);
          },
        });

        $('#test7').on('click', () => {
          upload.upload('test6');
        });

        // 拖拽上传
        upload.render({
          elem: '#test8',
          url: url,
          onSuccess(res, params) {
            console.log(res, params);
          },
        });

        // 绑定原始文件域
        upload.render({
          elem: '#test9',
          url: url,
          onSuccess(res, params) {
            console.log(res, params);
          },
        });
      });
    </script>
  </body>
</html>
