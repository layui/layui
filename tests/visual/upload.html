<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>上传组件 - layui</title>

    <link rel="stylesheet" href="./assets/dist/css/layui.css" />

    <style>
      .lay-upload-img {
        width: 92px;
        height: 92px;
        margin: 0 10px 10px 0;
      }
      hr {
        margin: 32px 0;
      }
    </style>
  </head>
  <body class="lay-padding-5">
    <div class="lay-upload">
      <button type="button" class="lay-btn" id="test1" name="123">
        上传文件
      </button>
    </div>

    <hr />

    <div class="lay-upload">
      <button type="button" class="lay-btn" id="test2">多选文件上传</button>
      <div class="lay-upload-list" id="demo2"></div>
    </div>

    <hr />

    <div class="lay-upload">
      <button type="button" class="lay-btn lay-btn-normal" id="testList">
        选择多文件
      </button>
      <div class="lay-upload-list">
        <table class="lay-table">
          <thead>
            <th>文件名</th>
            <th>大小</th>
            <th>上传进度</th>
            <th>操作</th>
          </thead>
          <tbody id="demoList"></tbody>
        </table>
      </div>
      <button type="button" class="lay-btn" id="testListAction">
        开始上传
      </button>
    </div>

    <hr />

    <div class="lay-btn-container">
      <button
        type="button"
        class="lay-btn test333"
        lay-data="{maxSize:10,url:'a'}"
        id="test3"
      >
        <i class="lay-icon">&#xe67c;</i>上传文件
      </button>
      <button
        type="button"
        class="lay-btn lay-btn-primary test333"
        lay-data="{maxSize:20,url:'b'}"
        id="test33"
      >
        <i class="lay-icon">&#xe67c;</i>换个样式
      </button>

      <button type="button" class="lay-btn" id="test4">
        <i class="lay-icon">&#xe67c;</i>上传视频
      </button>
      <button type="button" class="lay-btn" id="test5">
        <i class="lay-icon">&#xe67c;</i>上传音频
      </button>
    </div>

    <hr />

    <div class="lay-btn-container">
      <button class="lay-btn testm" lay-data="{url: '/a/'}">
        参数设在元素上
      </button>
      <button class="lay-btn testm" lay-data="{url: '/b/',maxSize:5}">
        参数设在元素上
      </button>
    </div>

    <hr />

    <div class="lay-btn-container">
      <button type="button" class="lay-btn lay-btn-normal" id="test6">
        选择文件
      </button>
      <button type="button" class="lay-btn" id="test7">开始上传</button>
    </div>

    <hr />
    <br />

    <div class="lay-upload-drag" id="test8">
      <i class="lay-icon">&#xe67c;</i>
      <p>点击上传，或将文件拖拽到此处</p>
    </div>

    <hr />
    <br />

    绑定原始文件域：<input type="file" name="file" id="test9" />

    <script src="./assets/dist/layui.js"></script>
    <script>
      layui.use(() => {
        const { upload, layer, progress, $ } = layui;

        // 模拟接口
        // 若需模拟上传过程，而不真实上传文件，可使用 httpbin 开源 HTTP 接口
        const url = 'https://httpbin.org/post';

        const uploadInst = upload.render({
          elem: '#test1',
          url: url,
          method: 'get',
          data: { a: 1, b: () => 2 }, // 追加接口参数
          // maxSize: 2000,
          onChoose(obj) {
            console.log('choose', obj);
          },
          async beforeUpload(obj) {
            return new Promise(function (resolve, reject) {
              const time = 3000;
              layer.msg('模拟上传中...', { time });
              setTimeout(function () {
                // 模拟「继续上传」或「阻止上传」
                if (true) {
                  layer.closeLast();
                  resolve(true);
                } else {
                  layer.msg('上传已被取消', { time });
                  reject();
                }
              }, 500);
            });
          },
          onSuccess(...args) {
            console.log(`${this.id} → onSuccess  → `, args);
          },
          onError(res, id) {
            console.log(`${this.id} → onError  → `, res, id);
          },
          onProgress(res) {
            console.log(`${this.id} → onProgress  → `, res);
          },
        });

        // 重载上述实例
        uploadInst.reload({
          fieldName: 'avatar',
          // maxSize: 2,
        });

        console.dir(upload);
        console.log(uploadInst);

        // 多选文件上传
        upload.render({
          elem: '#test2',
          url: url, // 实际使用时改成您自己的上传接口即可
          multiple: true, // 多选文件
          // mergeRequest: true,
          maxCount: 3,
          // maxSize: 10,
          beforeUpload(obj) {
            console.log(`${this.id} → beforeUpload  → `, obj);
          },
          onSuccess(res, files, file) {
            console.log(`${this.id} → onSuccess  → `, res, files, file);
          },
          onError(res, files, file, e) {
            console.log(`${this.id} → onError  → `, res, files, file, e);
          },
          onComplete(obj) {
            console.log(`${this.id} → onComplete  → `, obj);
          },
        });

        // 演示多文件列表 ---  本示例仅演示未开启 mergeRequest 属性的情况
        var demoListView = $('#demoList');
        var uploadListIns = upload.render({
          elem: '#testList',
          url: url, // 实际使用时改成您自己的上传接口即可
          multiple: true,
          maxCount: 5,
          autoUpload: false,
          submitElem: '#testListAction',
          // maxSize: 30,
          onChoose(obj) {
            var files = (this.files = obj.pushFile()); // 将每次选择的文件追加到文件队列
            // 读取本地文件
            obj.preview((index, file, result) => {
              var tr = $(
                [
                  '<tr id="upload-' + index + '">',
                  '<td>' + file.name + '</td>',
                  '<td>' + (file.size / 1014).toFixed(1) + 'kb</td>',
                  '<td><div id="progress-' +
                    index +
                    '" class="lay-progress" lay-percent="0"></div></td>',
                  '<td>',
                  '<button class="lay-btn lay-btn-xs demo-reload lay-hide">重传</button>',
                  '<button class="lay-btn lay-btn-xs lay-btn-danger demo-delete">删除</button>',
                  '</td>',
                  '</tr>',
                ].join(''),
              );

              // 单个重传
              tr.find('.demo-reload').on('click', () => {
                obj.upload(index, file);
              });
              tr.find('.demo-delete').on('click', () => {
                console.log(files, index);
                delete files[index]; // 删除对应的文件
                tr.remove();
                uploadListIns.options.$elem.next()[0].value = ''; // 清空 input file 值，以免删除后出现同名文件不可选
              });

              demoListView.append(tr);
              progress.render({
                elem: tr.find('.lay-progress'),
              });
            });
          },
          onSuccess(res, index) {
            var tr = demoListView.find('tr#upload-' + index);
            var tds = tr.children();
            tds.eq(3).html(''); // 清空操作
            delete this.files[index]; // 删除文件队列已经上传成功的文件
          },
          onError(res, index) {
            var tr = demoListView.find('tr#upload-' + index);
            var tds = tr.children();
            tds.eq(3).find('.demo-reload').removeClass('lay-hide'); // 显示重传
            progress.setValue('progress-' + index, 0);
          },
          onComplete(obj) {
            console.log(obj);
          },
          onProgress(res) {
            const { percent, index } = res;
            console.log(percent + '%', res);
            progress.setValue('progress-' + index, percent); // 进度条
          },
        });

        upload.render({
          elem: '.test333',
          url: url,
          onChoose(obj) {
            console.log(this.$elem);
          },
          onSuccess(res) {
            console.log(res);
          },
        });

        upload.render({
          elem: '.testm',
          onSuccess(res, index) {
            console.log(this);
          },
        });

        upload.render({
          elem: '#test4',
          url: url, // 实际使用时改成您自己的上传接口即可
          onSuccess(res) {
            console.log(res);
          },
        });

        upload.render({
          elem: '#test5',
          url: '',
          onSuccess(res) {
            console.log(res);
          },
        });

        // 手动上传
        upload.render({
          elem: '#test6',
          url: url, // 实际使用时改成您自己的上传接口即可
          autoUpload: false,
          submitElem: '#test7',
          // multiple: true,
          onChoose(obj) {
            obj.preview((index, file) => {
              this.$elem.after(
                '<span class="lay-inline lay-upload-choose">' +
                  file.name +
                  '</span>',
              );
              console.log(file.name);
              // obj.resetFile(index, file, '123.jpg');
            });
          },
          beforeUpload(obj) {
            console.log(345);
          },
          onSuccess(res) {
            console.log(res);
          },
        });

        upload.render({
          elem: '#test8',
          url: url, // 实际使用时改成您自己的上传接口即可
          onSuccess(res) {
            console.log(res);
          },
        });

        upload.render({
          elem: '#test9',
          url: url, // 实际使用时改成您自己的上传接口即可
          onSuccess(res) {
            console.log(res);
          },
        });
      });
    </script>
  </body>
</html>
