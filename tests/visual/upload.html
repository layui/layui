<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>上传组件 - layui</title>
    <link rel="stylesheet" href="./assets/dist/css/layui.css" />
  </head>
  <body class="lay-padding-5">
    <h2>常规示例</h2>
    <hr />
    <button type="button" class="lay-btn" id="test1">选择文件</button>

    <br />

    <h2>开启多选</h2>
    <hr />
    <button type="button" class="lay-btn" id="test2">多选文件上传</button>
    <br />
    <div class="lay-btn-container">
      <button
        type="button"
        class="lay-btn lay-btn-primary lay-btn-disabled"
        id="test2-abort"
        disabled
        lay-on="abort"
      >
        中止上传
      </button>
      <button
        type="button"
        class="lay-btn lay-btn-primary"
        id="test2-clear"
        lay-on="clear"
      >
        清空上传列表
      </button>
    </div>

    <br />

    <h2>自定义上传图片列表</h2>
    <hr />
    <button type="button" class="lay-btn lay-btn-normal" id="testImageList">
      选择图片
    </button>
    <style>
      .demo-upload-image-list {
        display: flex;
        flex-wrap: wrap;
        gap: 11px;
        margin-top: 11px;
      }
      .demo-upload-image-list-item {
        position: relative;
        --border-radius: 3px;
        img {
          width: 115px;
          height: 115px;
          object-fit: cover;
          border-radius: var(--border-radius);
        }
        .lay-icon {
          color: rgba(255, 255, 255, 0.9);
        }
        .lay-icon[class*='lay-icon-loading'] {
          font-size: 24px;
        }
        .lay-icon-close {
          position: absolute;
          top: 3px;
          right: 3px;
          color: rgba(255, 255, 255, 0.9);
          cursor: pointer;
        }
      }
      .demo-upload-image-list-loading {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .demo-upload-image-list-loading:after,
      .demo-upload-image-progress {
        position: absolute;
        top: 0;
        height: 100%;
        width: 100%;
        border-radius: var(--border-radius);
        background-color: rgba(0, 0, 0, 0.5);
        transition: all 0.3s;
      }
      .demo-upload-image-list-loading:after {
        content: '';
        background-color: rgba(0, 0, 0, 0.1);
      }
    </style>
    <div class="demo-upload-image-list" id="testImageListContainer"></div>

    <br /><br />

    <h2>手动上传</h2>
    <hr />
    <div class="lay-btn-container">
      <button type="button" class="lay-btn lay-btn-normal" id="test6">
        选择文件
      </button>
      <button type="button" class="lay-btn" id="test7">开始上传</button>
    </div>

    <br />

    <h2>拖拽上传</h2>
    <br />
    <div class="lay-upload-drag" id="test8">
      <i class="lay-icon">&#xe67c;</i>
      <p>点击上传，或将文件拖拽到此处</p>
    </div>

    <br />

    <h2>绑定原始文件域</h2>
    <hr />
    <input type="file" name="file" id="test9" />

    <script src="./assets/dist/layui.js"></script>
    <script>
      layui.use(() => {
        const { upload, layer, utils, progress, $ } = layui;

        // 模拟接口
        // 若需模拟上传过程，而不真实上传文件，可使用 httpbin 开源 HTTP 接口
        const url = 'https://httpbin.org/post';

        // 常规示例
        const uploadInst = upload.render({
          elem: '#test1',
          url: url,
          data: { a: 1, b: () => 2 }, // 追加接口参数
          // maxSize: 2000,
          maxCount: 1,
          onSelect(obj) {
            console.log('choose', obj);
          },
          beforeUpload(obj) {
            const time = 3000;
            layer.msg('模拟上传中...', { time });

            // return false; // 直接返回 false 阻止上传

            // 返回 Promise，在异步中决定「继续上传」或「阻止上传」
            return new Promise((resolve, reject) => {
              setTimeout(() => {
                if (true) {
                  layer.closeLast();
                  resolve(true); // 继续上传
                  // 或通过 Promise.resolve(false) 来阻止上传
                  // resolve(false);
                } else {
                  layer.msg('上传已被取消', { time });
                  // 通过 Promise.reject() 来阻止上传，并传递自定义错误信息
                  reject('Upload blocked.');
                }
              }, 500);
            });
          },
          onSuccess(...args) {
            console.log(`${this.id} → onSuccess  → `, args);
          },
          onError(...args) {
            console.log(`${this.id} → onError  → `, args);
          },
          onProgress(res) {
            console.log(`${this.id} → onProgress  → `, res);
          },
        });

        // 重载上述实例
        uploadInst.reload({
          fieldName: 'avatar',
          // maxSize: 2,
        });

        console.dir(upload);
        console.log(uploadInst);

        // 开启多选
        const uploadInst2 = upload.render({
          elem: '#test2',
          url: url,
          multiple: true, // 多选文件
          // mergeRequest: true,
          // showUploadList: false,
          // maxSize: 10,
          maxCount: 3,
          beforeUpload(obj) {
            console.log(`${this.id} → beforeUpload  → `, obj);

            abortBtn.enable();
          },
          onSuccess(...args) {
            console.log(`${this.id} → onSuccess  → `, args);
          },
          onError(...args) {
            console.log(`${this.id} → onError  → `, args);
          },
          onComplete(obj) {
            console.log(`${this.id} → onComplete  → `, obj);
            abortBtn.disabled();
          },
        });

        const abortBtn = {
          elem: $('#test2-abort'),
          CLASS_BTN_DISABLED: 'lay-btn-disabled',
          DISABLED: 'disabled',
          enable() {
            this.elem
              .removeClass(this.CLASS_BTN_DISABLED)
              .removeAttr(this.DISABLED);
          },
          disabled() {
            this.elem
              .addClass(this.CLASS_BTN_DISABLED)
              .attr(this.DISABLED, this.DISABLED);
          },
        };

        utils.on({
          abort() {
            // 演示中止上传
            uploadInst2.abort();
            abortBtn.disabled();
            // uploadInst2.reload();
          },
          clear() {
            // 清空上传列表
            uploadInst2.clearUploadList();
          },
        });

        // 自定义上传图片列表
        upload.render({
          elem: '#testImageList',
          url: url,
          multiple: true,
          showUploadList: false, // 不显示默认的上传列表
          onSelect({ files }) {
            this.$uploadListTarget = $('#testImageListContainer');
            files.forEach((file) => {
              const $listItem = $(
                `<div class="demo-upload-image-list-item" id="${file.id}">
  <img src="${URL.createObjectURL(file)}">
  <div class="demo-upload-image-list-loading">
    <div class="demo-upload-image-progress"></div>
    <i class="lay-icon lay-icon-loading-1 lay-anim lay-anim-rotate lay-anim-loop"></i>
  </div>
  <i class="lay-icon lay-icon-close" title="删除"></i>
</div>
                      `,
              );
              this.$uploadListTarget.append($listItem);

              // 删除
              $listItem.find('.lay-icon-close').on('click', () => {
                file.jqXHR?.abort(); // 中止上传请求
                upload.deleteUploadItem(this.id, file); // 删除上传文件列表项
                $listItem.remove(); // 删除列表元素
              });
            });
          },
          onProgress({ percent, event, files }) {
            files.forEach((file) => {
              const $uploadListTarget = this.$uploadListTarget
                .find('.demo-upload-image-list-item')
                .filter((_, item) => $(item).attr('id') === file.id);
              $uploadListTarget
                .find('.demo-upload-image-progress')
                .css('height', `${100 - percent}%`);
            });
          },
          onSuccess({ files }) {
            files.forEach((file) => {
              const $uploadListTarget = this.$uploadListTarget
                .find('.demo-upload-image-list-item')
                .filter((_, item) => $(item).attr('id') === file.id);
              $uploadListTarget
                .find('.demo-upload-image-list-loading')
                .remove();
            });
          },
        });

        // 手动上传
        upload.render({
          elem: '#test6',
          url: url,
          autoUpload: false,
          // multiple: true,
          beforeUpload(obj) {
            console.log(345);
          },
          onSuccess(res) {
            console.log(res);
          },
        });

        $('#test7').on('click', () => {
          upload.upload('test6');
        });

        // 拖拽上传
        upload.render({
          elem: '#test8',
          url: url,
          onSuccess(res) {
            console.log(res);
          },
        });

        // 绑定原始文件域
        upload.render({
          elem: '#test9',
          url: url,
          onSuccess(res) {
            console.log(res);
          },
        });
      });
    </script>
  </body>
</html>
