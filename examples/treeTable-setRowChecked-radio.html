    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>treeTable setRowChecked radio 复现 - layui</title>
    <link rel="stylesheet" href="../src/css/layui.css" />
  </head>
  <body class="layui-padding-3">
    <h2>treeTable：row 事件中 setRowChecked({ type: 'radio' }) 行高亮验证</h2>

    <br />

    <table class="layui-hide" id="ID-treeTable-demo-setRowChecked"></table>

    <script type="text/html" id="demo-toolbar-setRowChecked">
      <div class="layui-btn-container">
        <button class="layui-btn layui-btn-sm" lay-event="getCheckData">
          获取选中行数据
        </button>
      </div>
    </script>

    <script src="../src/layui.js"></script>

              { field: 'sign', title: '签名' },
              { field: 'experience', title: '积分', width: 80, sort: true }
            ]
          ],
          toolbar: '#demo-toolbar-setRowChecked',
          initSort: {
            field: 'experience',
            type: 'desc'
          },
          height: 366
        });

        // 行单击事件
        treeTable.on('row(ID-treeTable-demo-setRowChecked)', function (obj) {
          var data = obj.data;

          layer.msg('当前行数据：<br>' + JSON.stringify(data), {
            offset: '65px'
          });

          obj.setRowChecked({
            type: 'radio'
          });
        });

        // 头工具栏事件
        treeTable.on(
          'toolbar(ID-treeTable-demo-setRowChecked)',
          function (obj) {
            var checkStatus = treeTable.checkStatus(obj.config.id);
            if (obj.event === 'getCheckData') {
              layer.alert(JSON.stringify(checkStatus.data));
            }
          }
        );
      });
